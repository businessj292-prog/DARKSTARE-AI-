<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DarkStare AI"/>
<meta name="theme-color" content="#050a0f"/>
<meta name="description" content="DarkStare AI — Dual-AI Forex & Gold Trading Brain with live signals"/>
<link rel="manifest" href="/manifest.json"/>
<title>DarkStare AI — Trading Brain</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a0f;--s1:#080f18;--s2:#0c1520;--s3:#111d2b;
  --bd:#192a3e;--bd2:#213650;
  --gold:#d4a017;--gold2:#f0c040;--glw:rgba(212,160,23,.12);
  --grn:#18c463;--red:#e03030;--blu:#3a9edd;--pur:#9b6dff;--cya:#17c4c4;
  --tx:#c5ddf0;--tx2:#6e90ad;--tx3:#334f66;
  --fn:'Space Mono',monospace;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --r:4px;--r2:9px;--r3:14px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:13px;overflow:hidden}
#root,.wrap{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes dotP{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.45)}}
@keyframes signalIn{from{opacity:0;transform:scale(.96) translateY(7px)}to{opacity:1;transform:none}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 18px 3px rgba(212,160,23,.18)}}
@keyframes scan{0%{top:-3px}100%{top:100%}}
@keyframes introIn{from{opacity:0;transform:scale(.93) translateY(20px)}to{opacity:1;transform:none}}
@keyframes floatUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.fu{animation:fadeUp .22s ease forwards}
.spin{animation:spin .7s linear infinite;display:inline-block}
/* Layout */
.hdr{display:flex;align-items:center;gap:10px;padding:0 14px;height:52px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.logo{font-family:var(--fh);font-size:16px;font-weight:900;color:var(--gold);letter-spacing:.04em;white-space:nowrap}
.logo-v{font-size:7.5px;font-family:var(--fn);color:var(--tx3);letter-spacing:.18em;display:block;margin-top:-2px}
.hdr-r{margin-left:auto;display:flex;gap:6px;align-items:center}
.spill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:8.5px;font-family:var(--fn);letter-spacing:.08em;border:1px solid}
.sp-live{background:rgba(24,196,99,.06);border-color:rgba(24,196,99,.28);color:var(--grn)}
.sp-busy{background:rgba(212,160,23,.06);border-color:rgba(212,160,23,.28);color:var(--gold)}
.sp-idle{background:rgba(51,79,102,.06);border-color:rgba(51,79,102,.2);color:var(--tx3)}
.ldot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:dotP 1.6s ease infinite;flex-shrink:0}
.tkr{height:23px;background:var(--bg);border-bottom:1px solid var(--bd);overflow:hidden;flex-shrink:0}
.tkr-i{display:flex;gap:24px;animation:ticker 55s linear infinite;white-space:nowrap;font-family:var(--fn);font-size:8.5px;padding:4px 12px;align-items:center}
.body{display:flex;flex:1;overflow:hidden}
.sbar{width:52px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:7px 0;gap:2px;flex-shrink:0}
.nv{width:40px;height:43px;border-radius:var(--r2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .14s;color:var(--tx3);user-select:none;border:1px solid transparent;-webkit-tap-highlight-color:transparent}
.nv:hover{background:var(--s3);color:var(--tx2)}
.nv.on{background:var(--glw);color:var(--gold);border-color:rgba(212,160,23,.2);animation:goldGlow 3s ease infinite}
.nv-ic{font-size:16px;line-height:1}
.nv-lb{font-size:6px;font-family:var(--fn);letter-spacing:.06em;margin-top:2px;text-transform:uppercase}
.main{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:11px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:var(--r2);font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;transition:all .14s;border:1px solid transparent;outline:none;white-space:nowrap;-webkit-tap-highlight-color:transparent;user-select:none}
.btn:active{transform:scale(.95)}.btn:disabled{opacity:.33;pointer-events:none}
.bt-gold{background:var(--gold);color:#050200;font-weight:700;border-color:var(--gold)}.bt-gold:hover{background:var(--gold2)}
.bt-gh{background:transparent;color:var(--tx);border-color:var(--bd2)}.bt-gh:hover{background:var(--s3);border-color:var(--gold);color:var(--gold)}
.bt-grn{background:rgba(24,196,99,.08);color:var(--grn);border-color:rgba(24,196,99,.25)}.bt-grn:hover{background:rgba(24,196,99,.16)}
.bt-red{background:rgba(224,48,48,.08);color:var(--red);border-color:rgba(224,48,48,.25)}
.bt-pur{background:rgba(155,109,255,.08);color:var(--pur);border-color:rgba(155,109,255,.25)}.bt-pur:hover{background:rgba(155,109,255,.16)}
.bt-cya{background:rgba(23,196,196,.08);color:var(--cya);border-color:rgba(23,196,196,.25)}.bt-cya:hover{background:rgba(23,196,196,.16)}
.bt-sm{padding:4px 10px;font-size:11px}.bt-xs{padding:3px 8px;font-size:10px;font-family:var(--fn)}.bt-ic{padding:7px 9px}
/* Cards */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);padding:14px;position:relative;overflow:hidden}
.ch{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--tx3);text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:13px;flex-wrap:wrap}
/* Signal card */
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);padding:14px;animation:signalIn .28s ease;position:relative;overflow:hidden}
.sc.buy{border-top:2px solid var(--grn)}.sc.sell{border-top:2px solid var(--red)}.sc.wait{border-top:2px solid var(--tx3)}
.sc-scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.4),transparent);animation:scan 2.8s ease-in-out infinite;pointer-events:none}
.sb{display:inline-flex;align-items:center;gap:4px;padding:3px 11px;border-radius:3px;font-family:var(--fn);font-size:11px;font-weight:700;letter-spacing:.1em}
.sb-buy{background:rgba(24,196,99,.1);color:var(--grn);border:1px solid rgba(24,196,99,.28)}
.sb-sell{background:rgba(224,48,48,.1);color:var(--red);border:1px solid rgba(224,48,48,.28)}
.sb-wait{background:rgba(51,79,102,.1);color:var(--tx2);border:1px solid var(--bd)}
/* Tags */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:100px;font-size:8.5px;font-family:var(--fn);font-weight:700;letter-spacing:.07em;border:1px solid}
.tg{background:rgba(212,160,23,.07);color:var(--gold);border-color:rgba(212,160,23,.22)}
.tgr{background:rgba(24,196,99,.07);color:var(--grn);border-color:rgba(24,196,99,.22)}
.tr{background:rgba(224,48,48,.07);color:var(--red);border-color:rgba(224,48,48,.22)}
.tb{background:rgba(58,158,221,.07);color:var(--blu);border-color:rgba(58,158,221,.22)}
.tp{background:rgba(155,109,255,.07);color:var(--pur);border-color:rgba(155,109,255,.22)}
.tc{background:rgba(23,196,196,.07);color:var(--cya);border-color:rgba(23,196,196,.22)}
/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
@media(max-width:620px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
@media(max-width:420px){.g2,.g3,.g4{grid-template-columns:1fr}.main{padding:9px;gap:9px}.hdr{padding:0 10px}}
/* Stat */
.stb{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:11px 13px}
.stv{font-family:var(--fh);font-size:20px;font-weight:800;line-height:1}
.stl{font-size:8.5px;color:var(--tx3);font-family:var(--fn);letter-spacing:.09em;margin-top:4px;text-transform:uppercase}
/* Conf bar */
.cb{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:5px}
.cbf{height:100%;border-radius:2px;transition:width .6s ease}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{font-family:var(--fn);font-size:8px;letter-spacing:.1em;color:var(--tx3);text-transform:uppercase;padding:5px 7px;text-align:left;border-bottom:1px solid var(--bd)}
.tbl td{padding:6px 7px;border-bottom:1px solid rgba(25,42,62,.6)}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--s2)}
/* Input */
.inp{width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);color:var(--tx);font-family:var(--fb);font-size:13px;transition:border-color .14s;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--glw)}.inp::placeholder{color:var(--tx3)}
.lbl{font-size:9px;color:var(--tx3);margin-bottom:4px;font-family:var(--fn);letter-spacing:.11em;text-transform:uppercase;display:block}
/* Toggle */
.tog{width:34px;height:18px;border-radius:9px;background:var(--s3);border:1px solid var(--bd2);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--gold)}.tog-h{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on .tog-h{transform:translateX(16px)}
/* Loader */
.ldr{width:12px;height:12px;border:1.5px solid var(--bd2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
/* Info */
.ibox{background:var(--s2);border:1px solid var(--bd);border-left:3px solid var(--gold);border-radius:var(--r2);padding:12px 14px;font-size:12px;line-height:1.75;color:var(--tx2)}
.ibox strong{color:var(--gold)}
/* Range */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:2px;background:var(--bd2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--s1)}
/* DVd */
.dvd{height:1px;background:var(--bd);margin:10px 0}
/* Pbar */
.pbar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.pbf{height:100%;border-radius:3px;transition:width .5s ease}

/* ── INTRO / LANDING ── */
.intro{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.intro-glow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(212,160,23,.08) 0%,transparent 70%);pointer-events:none}
.intro-logo{font-family:var(--fh);font-size:clamp(36px,8vw,72px);font-weight:900;color:var(--gold);letter-spacing:.02em;text-align:center;animation:introIn .6s ease forwards}
.intro-tagline{font-family:var(--fn);font-size:clamp(9px,2vw,12px);color:var(--tx3);letter-spacing:.2em;text-align:center;margin-top:6px;animation:introIn .6s .1s ease both}
.intro-desc{font-family:var(--fb);font-size:clamp(13px,2.5vw,16px);color:var(--tx2);text-align:center;max-width:480px;line-height:1.8;margin:28px 0;animation:introIn .6s .2s ease both}
.intro-plans{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:560px;margin-bottom:28px;animation:introIn .6s .3s ease both}
@media(max-width:500px){.intro-plans{grid-template-columns:repeat(2,1fr)}}
.intro-plan{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 10px;text-align:center}
.intro-plan.hot{border-color:rgba(212,160,23,.4);background:rgba(212,160,23,.04)}
.intro-plan-n{font-family:var(--fn);font-size:8px;color:var(--tx3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.intro-plan-p{font-family:var(--fh);font-size:20px;font-weight:900;color:var(--gold)}
.intro-plan-f{font-size:9px;color:var(--tx3);margin-top:4px;line-height:1.6}
.intro-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;animation:introIn .6s .4s ease both}
.intro-features{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:500px;margin-top:20px;animation:introIn .6s .5s ease both}

/* ── AUTH ── */
.auth-overlay{position:fixed;inset:0;background:rgba(5,10,15,.97);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;backdrop-filter:blur(8px)}
.auth-box{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);padding:28px;width:100%;max-width:400px;animation:introIn .25s ease}
.auth-logo{font-family:var(--fh);font-size:24px;font-weight:900;color:var(--gold);text-align:center}
.auth-sub{font-size:9px;font-family:var(--fn);color:var(--tx3);letter-spacing:.18em;text-align:center;margin-bottom:22px;margin-top:4px}
.auth-tabs{display:flex;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:8px;text-align:center;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600;transition:all .14s;color:var(--tx3);-webkit-tap-highlight-color:transparent}
.auth-tab.on{background:var(--gold);color:#050200;font-weight:700}
.pw-wrap{position:relative}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--tx3);font-size:16px;user-select:none;-webkit-tap-highlight-color:transparent}
.pw-eye:hover{color:var(--gold)}

/* ── UPGRADE MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(5,10,15,.94);display:flex;align-items:center;justify-content:center;z-index:400;padding:16px;backdrop-filter:blur(6px)}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);padding:24px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:introIn .22s ease}
.tier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(max-width:480px){.tier-grid{grid-template-columns:1fr 1fr}}
.tier-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;cursor:pointer;transition:all .15s;position:relative}
.tier-card:hover,.tier-card:active{border-color:var(--gold);background:rgba(212,160,23,.04);transform:translateY(-2px)}
.tier-card.pop{border-color:rgba(212,160,23,.35)}
.tier-badge{position:absolute;top:-8px;right:10px;background:var(--gold);color:#050200;font-size:7.5px;font-family:var(--fn);font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.1em}
.tier-name{font-family:var(--fn);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.tier-price{font-family:var(--fh);font-size:22px;font-weight:900;line-height:1;color:var(--gold)}
.tier-list{list-style:none;font-size:10px;color:var(--tx2);line-height:2;margin-top:9px}
.tier-list li{padding-left:14px;position:relative}
.tier-list li::before{content:'✓';position:absolute;left:0;color:var(--grn);font-size:8.5px}
.tier-list li.no{color:var(--tx3)}.tier-list li.no::before{content:'✗';color:var(--tx3)}

/* ── SHARE BANNER ── */
.share-bar{background:linear-gradient(135deg,var(--s2),rgba(212,160,23,.05));border:1px solid rgba(212,160,23,.2);border-radius:var(--r3);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* ── Chat ── */
.chat-msg{padding:10px 13px;border-radius:var(--r2);font-size:12px;line-height:1.75;max-width:90%;animation:fadeUp .2s ease}
.cm-u{background:var(--s3);border:1px solid var(--bd2);align-self:flex-end;border-radius:var(--r2) var(--r2) 4px var(--r2)}
.cm-ai{background:var(--s2);border:1px solid var(--bd);align-self:flex-start;color:var(--tx2);border-radius:var(--r2) var(--r2) var(--r2) 4px}
.cm-who{font-size:8px;font-family:var(--fn);color:var(--tx3);margin-bottom:3px;letter-spacing:.07em;text-transform:uppercase}

/* ── KEY ROW ── */
.key-row{padding:11px 0;border-bottom:1px solid rgba(25,42,62,.5)}
.key-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react,env">
const {useState,useEffect,useRef,useCallback,Fragment}=React;

/* ── API ─────────────────────────────────────────────────────────────────── */
const api=async(p,o={})=>{
  const token=localStorage.getItem('ds_token')||'';
  const headers={'Content-Type':'application/json'};
  if(token)headers['Authorization']='Bearer '+token;
  if(o.headers)Object.assign(headers,o.headers);
  try{
    const r=await fetch(p,Object.assign({},o,{headers:headers}));
    return await r.json();
  }catch(e){return {error:''+e};}
};
const post=(p,b)=>api(p,{method:'POST',body:JSON.stringify(b)});
const del=(p)=>api(p,{method:'DELETE'});

const gc=c=>c>=72?'var(--grn)':c>=52?'var(--gold)':'var(--red)';
const Ldr=({s=12})=>React.createElement('span',{className:'ldr',style:{width:s,height:s}});
const Tog=({on,cb})=>React.createElement('div',{className:'tog'+(on?' on':''),onClick:()=>cb(!on)},React.createElement('div',{className:'tog-h'}));

const TIER_CLR={free:'var(--tx3)',starter:'var(--blu)',pro:'var(--gold)',elite:'var(--pur)'};

/* ── INTRO SCREEN ────────────────────────────────────────────────────────── */
function IntroScreen({onEnter}){
  const features=['⚡ Built-in AI','🌐 Live Prices','📰 Live News','🔮 Polymarket','💬 AI Chat','🔗 MT5 Integration','📱 Mobile App','🌍 Cloud Ready'];
  return(
    <div className="intro">
      <div className="intro-glow"/>
      <div className="intro-logo">⚡ DARKSTARE</div>
      <div className="intro-tagline">AI TRADING BRAIN · BUSINESS EDITION v4.0</div>
      <div className="intro-desc">
        Dual-AI forex &amp; gold signal platform. Built-in AI works <strong style={{color:'var(--gold)'}}>instantly — no API keys needed</strong>. Upgrade to unlock Claude + GPT-4o, live prices, news, and MT5 integration.
      </div>
      <div className="intro-plans">
        {[['FREE','$0','3 signals/day'],['STARTER','$5/mo','20/day + MT5'],['PRO','$15/mo','100/day + Claude'],['ELITE','$30/mo','Unlimited + All AI']].map(([n,p,f],i)=>(
          <div key={n} className={'intro-plan'+(i===2?' hot':'')}>
            <div className="intro-plan-n">{n}</div>
            <div className="intro-plan-p">{p}</div>
            <div className="intro-plan-f">{f}</div>
          </div>
        ))}
      </div>
      <div className="intro-btns">
        <button className="btn bt-gold" style={{fontSize:14,padding:'11px 28px'}} onClick={()=>onEnter('register')}>→ Get Started Free</button>
        <button className="btn bt-gh" style={{fontSize:14,padding:'11px 28px'}} onClick={()=>onEnter('login')}>Sign In</button>
      </div>
      <div className="intro-features">
        {features.map(f=><span key={f} className="tag tc" style={{fontSize:9.5,padding:'3px 9px'}}>{f}</span>)}
      </div>
    </div>
  );
}

/* ── AUTH SCREEN ─────────────────────────────────────────────────────────── */
function AuthScreen({onLogin,startMode}){
  const [mode,setMode]=useState(startMode||'login');
  const [form,setForm]=useState({name:'',email:'',password:''});

    const r=await post(mode==='login'?'/api/auth/login':'/api/auth/register',form);

              <input className="inp" style={{paddingRight:40}} type={showPw?'text':'password'} placeholder="••••••••" value={form.password} onChange={e=>setForm(f=>Object.assign({},f,{password:e.target.value}))} onKeyDown={e=>{if(e.key==='Enter')submit();}}/>

          <button className="btn bt-gold" style={{width:'100%',justifyContent:'center',marginTop:4,fontSize:13,padding:'11px'}} onClick={submit} disabled={loading}>
            {loading?React.createElement(Fragment,null,React.createElement(Ldr,{s:14}),' Please wait...'):(mode==='login'?'→ Sign In':'→ Create Free Account')}
          </button>
          <div style={{textAlign:'center',fontSize:10.5,color:'var(--tx3)'}}>
            {mode==='login'?React.createElement(Fragment,null,'No account? ',React.createElement('span',{style:{color:'var(--gold)',cursor:'pointer'},onClick:()=>setMode('register')},'Create one free'))
              :React.createElement(Fragment,null,'Already registered? ',React.createElement('span',{style:{color:'var(--gold)',cursor:'pointer'},onClick:()=>setMode('login')},'Sign in'))}
          </div>
        </div>
      </div>
    </div>
  );
}
