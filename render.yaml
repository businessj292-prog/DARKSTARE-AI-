services:
  - type: web
    name: darkstare-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: APP_URL
        value: https://darkstare-ai.onrender.com
      - key: PORT
        value: 10000
    healthCheckPath: /api/status
